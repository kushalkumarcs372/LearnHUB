# H2 in-memory DB profile for quick demos (no MySQL needed).
# Run with:
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2

server.port=8080

# Persist H2 data across restarts (so users/courses/login work without re-creating).
spring.datasource.url=jdbc:h2:file:./data/learnhub;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

jwt.secret=dev-only-insecure-secret-change-this-in-production-32bytes-min
jwt.expiration=86400000

app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000
app.seed.enabled=true
app.seed.demo.enabled=false
app.public.base-url=http://localhost:8080
app.upload.dir=uploads

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
