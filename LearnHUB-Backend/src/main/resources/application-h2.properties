# =========================
# H2 DATABASE (DEMO MODE)
# =========================
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/learnhub;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =========================
# JWT CONFIG
# =========================
jwt.secret=dev-only-insecure-secret-change-this-in-production-32bytes-min
jwt.expiration=86400000

# =========================
# CORS CONFIG
# =========================
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000

# =========================
# DEMO DATA
# =========================
app.seed.enabled=true
app.seed.demo.enabled=false

# =========================
# FILE STORAGE
# =========================
app.upload.dir=uploads

# =========================
# H2 CONSOLE
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
