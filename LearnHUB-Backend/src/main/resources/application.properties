# =========================
# SERVER CONFIG
# =========================
server.port=${PORT:${SERVER_PORT:8080}}

# =========================
# DATABASE (MySQL)
# =========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/learnhub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =========================
# JPA CONFIG
# =========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# =========================
# JWT CONFIG
# =========================
jwt.secret=${JWT_SECRET:dev-only-insecure-secret-change-this-in-production-32bytes-min}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# =========================
# CORS CONFIG
# =========================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# =========================
# FILE STORAGE
# =========================
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# =========================
# MULTIPART CONFIG
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================
# LOGGING
# =========================
logging.level.com.learnhub=INFO
logging.level.org.springframework.security=INFO

# =========================
# APP INFO
# =========================
spring.application.name=LearnHUB Backend
