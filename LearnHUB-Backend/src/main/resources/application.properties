# Server Configuration
# Many hosting platforms provide `PORT`; fallback to `SERVER_PORT`, then 8080.
server.port=${PORT:${SERVER_PORT:8080}}

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/learnhub?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
# Do not hardcode passwords in source control. Provide via env var or `application-local.properties`.
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.type.preferred_enum_jdbc_type=VARCHAR

# JWT Configuration
# HS256 requires a 256-bit (32+ byte) secret. Override in production via `JWT_SECRET`.
jwt.secret=${JWT_SECRET:dev-only-insecure-secret-change-this-in-production-32bytes-min}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS (comma-separated). Example: http://localhost:3000,http://127.0.0.1:3000,https://*.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,https://*.vercel.app}

# Public base URL for links generated by backend (e.g., material downloads).
app.public.base-url=${APP_PUBLIC_BASE_URL:http://localhost:8080}

# Local file uploads storage directory (materials upload)
app.upload.dir=${APP_UPLOAD_DIR:uploads}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.learnhub=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=INFO

# Application Name
spring.application.name=LearnHub Backend
